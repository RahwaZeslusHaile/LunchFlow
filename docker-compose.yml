services:
  backend:
    build:
      context: ./backend
    container_name: lunchflow-backend
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev

  frontend:
    build:
      context: ./frontend
    container_name: lunchflow-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173
    depends_on:
      - backend
